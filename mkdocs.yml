site_name: Afridyne Systems (PTY) LTD
site_url: https://example.com
site_author: John Piers Cilliers
site_description: >-
  Born for documents, yet beyond documents. 
  Accessible to everyone, extremely easy to use. 
  Modern, lightweight, customizable, responsive.

copyright: Copyright &copy; 2016 - 2026 JP Cillliers

theme:
  admonition:
    example:
      icon: material/format-list-group
    git:
      icon: simple/git
      color: '#f34f29'
    copyright:
      icon: material/copyright
      color: '#2b9b9b'
    heart:
      icon: octicons/heart-24
      color: '#a83e81'
    lyrics:
      icon: material/microphone
      color: '#5353af'
    soundcloud:
      icon: simple/soundcloud
      color: '#ff8e1a'  
  name: materialx
  custom_dir: overrides
  icon:
    annotation: material/arrow-right-circle
  topbar_style: glass
  favicon: assets/favicon.png  # Path relative to your 'docs' folder
  #mermaid:
  #  javascript:
  #    - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
  #  options:
  #    theme: default
  #    startOnLoad: true
  #    securityLevel: loose
  #    er:
  #      useMaxWidth: true
  include_search_page: true
  color_mode: auto
  user_color_mode_toggle: true
  locale: en
  analytics: {gtag: 'G-274394082'}
  features:
    - search.highlight
    - search.share
    - navigation.path
    - navigation.top
    - navigation.footer
    - content.tooltips
    - navigation.tracking
    - navigation.prune
    - search.suggest
    - content.code.collapse
    - content.code.copy
    - content.code.annotate
    - content.footnote.tooltips
    - content.action.edit
    - content.action.view
    - toc.follow
    - header.autohide


  palette: 
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Dark mode: Cyan primary
    - scheme: slate
      primary: cyan
      accent: cyan 
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: logo      

validation:
  anchors: ignore

plugins:
  - materialx/blog:         # Added 'material/'
      blog_dir: blog
      post_url_format: "{date}/{slug}"
      authors_file: "{blog}/.authors.yml"
      archive: false
  - rss:
      use_git: false        
      match_path: blog/posts/.* 
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
  - group:
      enabled: true
      plugins:
        - minify:
            minify_html: !ENV [DEPLOY, false]
  - social:
      cards_layout_options:
        background_color: "#00A2E3"
  #- mermaid2
  #- mermaid2:
  #    arguments:
  #      theme: base
  #      themeVariables:
  #        edgeLabelBackground: '#1e293b'  # Forces text boxes to match slate's background hex
  #        tertiaryColor: 'transparent'    # Strips away the faint box borders completely
  - table-reader
  - glightbox
  - mkdocstrings
  - autorefs
  - markdown-exec
  - section-index
  - open-in-new-tab
  - offline:
      enabled: !ENV [OFFLINE, false]
  - materialx/social:       # Added 'material/'
      enabled: !ENV [CI, true]
  - materialx/optimize:     # Added 'material/'
      enabled: !ENV [CI, false]
      cache: true
  - schema_reader
  - material/typeset       # Added 'material/'
  - caption:
      figure:
        enable: false
      table:
        enable: false
      custom:
        enable: false


