      - VariousMarkdown: Various_HTML_Markdown.md
      - TestBasicSyntax: TestBasicSyntax.md
  - Weather:
      - Stormy: Stormy.md
      - SimpleWeather: SimpleWeather.md
  - Media:
      - MPD Configure: mpd-configure.md
      - ALSA & Pulse: ALSA & Pulse.md
      - Pipewire: Pipewire.md
      - Pulse Code Modulation: PCM.md
      - Music Player Daemon: Music-Player-Daemon.md
  - ncmpcpp:
      - ncmpcpp: ncmpcpp.md
