site_name: Afridyne Systems (PTY) LTD
site_url: https://example.com
theme:
  name: material  
  custom_dir: overrides
  favicon: assets/favicon.png  # Path relative to your 'docs' folder
  mermaid:
    javascript:
      - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
    options:
      theme: default
      startOnLoad: true  
  include_search_page: true
  color_mode: auto
  user_color_mode_toggle: true
  locale: en
  analytics: {gtag: 'G-274394082'}
  features:
    - search.highlight
    - search.share
    - navigation.sections        # Keeps sections grouped together
    - navigation.path            # Shows breadcrumbs
    - navigation.top             # Adds a "Back to top" button
    - navigation.footer          # Enables prev/next links
    - navigation.indexes         # Allows section titles to be links
    - content.tooltips
    - navigation.tracking       
    - navigation.instant  # Fast SPA-like loading
    - search.suggest
    - content.code.copy
    - content.code.annotate
    #- navigation.tabs
    #- content.tabs.link
    - content.footnote.tooltips
    - content.action.edit
    - content.action.view
    - toc.follow
    - header.autohide
    # - navigation.expand        # Keep this commented out to allow collapsing

  palette:
    - media: '(prefers-color-scheme)'
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-auto
        name: 'Switch to light mode'
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
        name: 'Switch to dark mode'
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
        name: 'Switch to system preference'
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: logo      

validation:
  anchors: ignore

plugins:
  - blog:
      blog_dir: blog
      post_url_format: "{date}/{slug}"
      authors_file: "{blog}/.authors.yml"  # <--- Add this line
      archive: false  # This hides the archive description box
  - rss:
      use_git: false        
      match_path: blog/posts/.* 
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
  - group:
      enabled: true
      plugins:
        - minify:
            minify_html: !ENV [DEPLOY, false]
  - search
  - table-reader
  - glightbox
  - mkdocstrings
  - autorefs
  - markdown-exec
  - section-index
  - open-in-new-tab
  - offline:
      enabled: !ENV [OFFLINE, false]
  - social:
      enabled: !ENV [CI, true]
  - optimize:
      enabled: !ENV [CI, true]
      cache: false
  - schema_reader
  - typeset
  - caption:
      figure:
        enable: false
      table:
        enable: false
      custom:
        enable: false

nav:
  - MkDocs-Material:
      - MkDocs Start Page: MkDocs-Material-Start.md
      - Admonitions: admonitions.md
      - MkDocs Home: index.md  
      - MkDocsCaption: Caption.md
      - MkDocstrings: MkDocstrings.md
      - Text Colour: MathJax.md
      - Creating Your Site: rl.md
      - Get Started-MkDocs: about.md
      - Afridyne: afridyne.md
      - Blog Config: MkDocs-Material/blog.md
      - Social Config: MkDocs-Material/social.md
  - Blog: blog/index.md
  - Markdown:
      - Markdown: Markdown.md
      - CommonMarkSpec: CommonMarkSpec.md      
      - MD Cheat Sheet: Ultimate Markdown Cheat Sheet.md
      - Markdown Guide: Markdown Guide.md
      - Awesome Markdown: marktext.md
      - VariousMarkdown: Various_HTML_Markdown.md
      - TestBasicSyntax: TestBasicSyntax.md
  - Weather:
      - Stormy: Stormy.md
      - SimpleWeather: SimpleWeather.md
  - Media:
      - MPD Configure: mpd-configure.md
      - ALSA & Pulse: ALSA & Pulse.md
      - Pipewire: Pipewire.md
      - Pulse Code Modulation: PCM.md
      - Music Player Daemon: Music-Player-Daemon.md
      - ncmpcpp: ncmpcpp.md
      - ncmpcpp++: Mpd-Mpc.md
      - Keys Nav ncmpcpp: Keys_Movement_ncmpcpp.md
  - Arch Linux:
      - Overview: DOCS.md
      - OS Guide: Arch OS.md
      - Pacman: ArchLinux-Pacman.md
      - Installation Guide: ArchInstallationGuide.md
      - ArchInstall Script: ArchInstall.md
      - BBCode: Arch-BBCode.md
      - Archive: Arch Linux Archive.md
      - ALPM: ALPM.md
  - Microsoft:
      - OFGB: OFGB.md
      - MS Account Bypass: Bypass.md
  - uv Pip:
      - UV: UV.md
      - uv Main: uv_Main.md
  - Various Misc:
      - Aurdex: Aurdex.md
      - Bash-Git: BashGit.md
      - Curl: EverythingCurl.md
      - GElectrical: GElectrical.md
      - Chmod & Chown: chmod&chown.md
      - Fish-Shell: Fish-Shell.md
      - GPU Top: AMDgpu-Top.md
      - Badblocks: badblocks.md
      - Systemd: systemd.md

# --------------------------------------------------
# MARKDOWN EXTENSIONS MOVED TO CORRECT LOCATION HERE
# --------------------------------------------------

markdown_extensions:
  # Base Extensions
  - admonition
  - attr_list
  - def_list
  - abbr
  - pymdownx.blocks.html
  - nl2br
  - tables
  - footnotes
  - toc:
      permalink: true
      

  
  # --- Pymdownx Suite (Optimized order) ---
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          # Change 'fence_code_format' to 'mermaid_format' below:
          #format: !!python/name:pymdownx.superfences.mermaid_format
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.details
  - pymdownx.snippets
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true    
  - mkdocs-click
  
  
         
