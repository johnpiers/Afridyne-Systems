      - Keys Nav ncmpcpp: Keys_Movement_ncmpcpp.md
  - Arch Linux:
      - Overview: DOCS.md
      - OS Guide: Arch OS.md
      - Pacman: ArchLinux-Pacman.md
      - Installation Guide: ArchInstallationGuide.md
