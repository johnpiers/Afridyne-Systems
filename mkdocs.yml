# --------------------------------------------------
# MARKDOWN EXTENSIONS MOVED TO CORRECT LOCATION HERE
# --------------------------------------------------

markdown_extensions:
  # Base Extensions
  - admonition
  - attr_list
  - def_list
  - abbr
  - pymdownx.blocks.html
  - nl2br
  - tables
  - footnotes
  - toc:
      permalink: true

  # --- Pymdownx Suite (Optimized & Cleaned) ---
  - pymdown_multimd_table:
      rowspan: true
      multiline: true
      headerless: true
      multibody: true
      autolabel: true
      attr_list: true
  - pymdownx.keys:
      separator: " ＋ "
  - pymdownx.superfences:
      #preserve_tabs: true
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format # NATIVE INSTANT PARSER
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.details
  - pymdownx.snippets
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - mkdocs-click

  
  
         
